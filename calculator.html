*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080b12;--s1:#0e1221;--s2:#151928;--bd:#1e2640;
  --a:#00f5ff;--a2:#ff2060;--a3:#7c3aed;
  --t:#dde4f8;--td:#5a6a90;
  --glow:0 0 20px rgba(0,245,255,.35);
}
body{background:var(--bg);color:var(--t);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* NAV */
nav{display:flex;align-items:center;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 20px;position:sticky;top:0;z-index:100;gap:4px;overflow-x:auto;flex-shrink:0;}
nav::-webkit-scrollbar{height:0;}
.nav-logo{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--a);letter-spacing:3px;padding:14px 16px 14px 0;white-space:nowrap;border-right:1px solid var(--bd);margin-right:8px;text-decoration:none;flex-shrink:0;}
.nav-link{padding:14px 10px;color:var(--td);font-size:.78rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;text-decoration:none;transition:color .2s;border-bottom:2px solid transparent;flex-shrink:0;}
.nav-link:hover{color:var(--t);}
.nav-link.active{color:var(--a);border-bottom-color:var(--a);}
.nav-back{margin-left:auto;padding:8px 16px;flex-shrink:0;background:none;border:1px solid var(--bd);border-radius:8px;color:var(--a);font-family:'Exo 2',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.5px;text-decoration:none;transition:all .2s;white-space:nowrap;}
.nav-back:hover{border-color:var(--a);background:rgba(0,245,255,.06);}

/* PAGE */
.page-wrap{flex:1;max-width:820px;margin:0 auto;padding:28px 20px 48px;width:100%;}
.page-title{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;letter-spacing:2px;color:var(--a);margin-bottom:4px;}
.page-subtitle{font-size:.8rem;color:var(--td);margin-bottom:24px;letter-spacing:.5px;}

/* SHELL */
.calc-shell{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.calc-main{flex:1;min-width:280px;max-width:440px;}

/* MODE ROW */
.calc-mode-row{display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:3px;margin-bottom:12px;gap:2px;}
.calc-mode-btn{flex:1;padding:8px;border:none;background:none;color:var(--td);cursor:pointer;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;}
.calc-mode-btn.active{background:var(--a);color:#000;}

/* DISPLAY */
.calc-display{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:16px 18px 14px;margin-bottom:10px;position:relative;overflow:hidden;}
.calc-display::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--a),transparent);}
.calc-badge{position:absolute;top:10px;right:12px;font-size:.6rem;color:var(--td);background:var(--bd);padding:2px 8px;border-radius:4px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.calc-expr{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--td);min-height:20px;word-break:break-all;line-height:1.4;margin-bottom:8px;padding-right:90px;min-height:24px;}
.calc-result{font-family:'Share Tech Mono',monospace;font-size:2.2rem;color:var(--a);word-break:break-all;line-height:1.2;text-shadow:var(--glow);overflow-x:auto;white-space:pre-wrap;max-height:130px;overflow-y:auto;}
.calc-result::-webkit-scrollbar{height:3px;width:3px;}
.calc-result::-webkit-scrollbar-thumb{background:var(--bd);}

/* BUTTONS */
.calc-grid{display:grid;gap:7px;}
.calc-grid.basic{grid-template-columns:repeat(4,1fr);}
.calc-grid.sci{grid-template-columns:repeat(5,1fr);}
.cbtn{height:54px;padding:0 4px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--t);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:.9rem;transition:all .12s;display:flex;align-items:center;justify-content:center;user-select:none;position:relative;overflow:hidden;}
.cbtn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .1s;}
.cbtn:hover{border-color:rgba(0,245,255,.3);transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.35);}
.cbtn:hover::before{background:rgba(255,255,255,.03);}
.cbtn:active{transform:translateY(0);box-shadow:none;}
.cbtn.op{color:var(--a);border-color:rgba(0,245,255,.2);background:rgba(0,245,255,.04);}
.cbtn.eq{background:linear-gradient(135deg,var(--a),#00b8d4);color:#000;font-weight:700;border-color:var(--a);box-shadow:var(--glow);}
.cbtn.eq:hover{box-shadow:0 0 32px rgba(0,245,255,.6);}
.cbtn.clr{color:var(--a2);border-color:rgba(255,32,96,.2);background:rgba(255,32,96,.05);}
.cbtn.fn{color:#c4b5fd;font-size:.76rem;background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.2);}
.cbtn.fn:hover{background:rgba(124,58,237,.14);}
.cbtn.span2{grid-column:span 2;}

/* HISTORY */
.calc-history-pane{flex:1;min-width:190px;max-width:260px;}
.hist-box{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;max-height:520px;}
.hist-header{display:flex;justify-content:space-between;align-items:center;}
.hist-header h4{font-size:.68rem;color:var(--td);letter-spacing:1.5px;text-transform:uppercase;}
.hist-clr{background:none;border:1px solid rgba(255,32,96,.3);color:var(--a2);cursor:pointer;font-size:.66rem;padding:3px 8px;border-radius:5px;transition:all .15s;}
.hist-clr:hover{background:rgba(255,32,96,.1);}
.hist-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.hist-list::-webkit-scrollbar{width:3px;}
.hist-list::-webkit-scrollbar-thumb{background:var(--bd);}
.hist-empty{text-align:center;color:var(--td);font-size:.76rem;padding:20px 0;opacity:.5;}
.hist-item{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .15s;}
.hist-item:hover{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.03);}
.hi-expr{font-size:.68rem;color:var(--td);font-family:'Share Tech Mono',monospace;word-break:break-all;}
.hi-res{font-size:.9rem;color:var(--a);font-family:'Share Tech Mono',monospace;word-break:break-all;margin-top:3px;}

/* AD SLOT */
.ad-strip{margin-top:20px;text-align:center;}

/* FOOTER */
footer{text-align:center;padding:20px;border-top:1px solid var(--bd);font-size:.78rem;color:var(--td);}
footer a{color:var(--a);text-decoration:none;}
.footer-links{display:flex;gap:20px;justify-content:center;margin-bottom:8px;flex-wrap:wrap;}

@media(max-width:600px){
  .calc-history-pane{max-width:100%;width:100%;}
  .cbtn{height:50px;}
}

<script>
/* ══ BIG.JS CALCULATOR ══ */
let calcMode='basic';
let acc=null,pendingOp=null,pctBase=null,entry='0',justEvaled=false,exprDisp='';
let historyArr=[];

const BASIC=[
  [{l:'C',t:'clr'},{l:'DEL',t:'clr'},{l:'%',t:'op'},{l:'÷',t:'op'}],
  [{l:'7'},{l:'8'},{l:'9'},{l:'×',t:'op'}],
  [{l:'4'},{l:'5'},{l:'6'},{l:'−',t:'op'}],
  [{l:'1'},{l:'2'},{l:'3'},{l:'+',t:'op'}],
  [{l:'0',s:'span2'},{l:'.'},{l:'=',t:'eq'}],
];
const SCI=[
  [{l:'sin',t:'fn'},{l:'cos',t:'fn'},{l:'tan',t:'fn'},{l:'log',t:'fn'},{l:'ln',t:'fn'}],
  [{l:'asin',t:'fn'},{l:'acos',t:'fn'},{l:'atan',t:'fn'},{l:'√',t:'fn'},{l:'∛',t:'fn'}],
  [{l:'x²',t:'fn'},{l:'x³',t:'fn'},{l:'xʸ',t:'op'},{l:'!',t:'fn'},{l:'π',t:'fn'}],
  [{l:'e',t:'fn'},{l:'(',t:'op'},{l:')',t:'op'},{l:'%',t:'op'},{l:'C',t:'clr'}],
  [{l:'7'},{l:'8'},{l:'9'},{l:'×',t:'op'},{l:'÷',t:'op'}],
  [{l:'4'},{l:'5'},{l:'6'},{l:'−',t:'op'},{l:'+',t:'op'}],
  [{l:'1'},{l:'2'},{l:'3'},{l:'DEL',t:'clr'},{l:'=',t:'eq'}],
  [{l:'0',s:'span2'},{l:'.'},{l:'±',t:'op'}],
];

function switchCalcMode(mode,btn){
  calcMode=mode;
  document.querySelectorAll('.calc-mode-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  calcReset();renderCalcBtns();
}
function renderCalcBtns(){
  const wrap=document.getElementById('calc-buttons');
  wrap.innerHTML='';wrap.className=`calc-grid ${calcMode}`;
  const layout=calcMode==='basic'?BASIC:SCI;
  layout.forEach(row=>row.forEach(({l,t,s})=>{
    const b=document.createElement('button');
    b.className='cbtn'+(t?' '+t:'')+(s?' '+s:'');
    b.textContent=l;b.addEventListener('click',()=>calcPress(l));
    wrap.appendChild(b);
  }));
}
function calcReset(){acc=null;pendingOp=null;pctBase=null;entry='0';justEvaled=false;exprDisp='';updCalc();}
function updCalc(){
  document.getElementById('calc-expr').textContent=exprDisp;
  document.getElementById('calc-result').textContent=entry;
}
function bigFormat(big){
  try{const f=big.toFixed(80);return f.includes('.')?f.replace(/\.?0+$/,''):f;}
  catch(e){return big.toPrecision(40).replace(/\.?0+$/,'');}
}
function bigFact(n){
  const N=parseInt(n.toFixed(0));
  if(N<0||N>5000)throw new Error('Factorial: 0–5000 only');
  let r=new Big(1);for(let i=2;i<=N;i++)r=r.times(i);return r;
}
function applyOp(left,op,right){
  if(op==='+')return left.plus(right);
  if(op==='-')return left.minus(right);
  if(op==='*')return left.times(right);
  if(op==='^'){const en=parseFloat(right.toFixed(20));return Number.isInteger(en)&&Math.abs(en)<1e6?left.pow(en):new Big(Math.pow(parseFloat(left.toFixed(30)),en));}
  if(op==='/'){if(right.eq(0))throw new Error('Division by zero');return left.div(right);}
  return right;
}
function applyFn(fn,entryStr){
  const n=parseFloat(entryStr);
  if(fn==='x²')return new Big(n).pow(2);
  if(fn==='x³')return new Big(n).pow(3);
  if(fn==='!')return bigFact(new Big(entryStr));
  if(fn==='sqrt')return new Big(Math.sqrt(n));
  if(fn==='cbrt')return new Big(Math.cbrt(n));
  const fmap={sin:Math.sin,cos:Math.cos,tan:Math.tan,asin:Math.asin,acos:Math.acos,atan:Math.atan,log:Math.log10,ln:Math.log};
  if(fmap[fn]!==undefined)return new Big(fmap[fn](n));
  throw new Error('Unknown fn: '+fn);
}
function opSym(op){return op==='+'?'+':op==='-'?'−':op==='*'?'×':op==='/'?'÷':op==='^'?'^':op;}
function calcPress(label){
  if(label==='C'){calcReset();return;}
  if(label==='DEL'){
    if(justEvaled){calcReset();return;}
    if(entry.startsWith('⚠')){entry='0';updCalc();return;}
    entry=entry.length>1?entry.slice(0,-1):'0';updCalc();return;
  }
  if(/^\d$/.test(label)){
    if(justEvaled){acc=null;pendingOp=null;pctBase=null;exprDisp='';justEvaled=false;}
    if(entry.startsWith('⚠'))entry='0';
    entry=(entry==='0')?label:entry+label;updCalc();return;
  }
  if(label==='.'){
    if(justEvaled){acc=null;pendingOp=null;pctBase=null;exprDisp='';justEvaled=false;entry='0';}
    if(entry.startsWith('⚠'))entry='0';
    if(!entry.includes('.'))entry+='.';updCalc();return;
  }
  if(label==='±'){
    if(entry==='0'||entry==='0.')return;
    entry=entry.startsWith('-')?entry.slice(1):'-'+entry;updCalc();return;
  }
  if(label==='%'){
    if(entry==='0'&&!acc)return;
    try{
      pctBase=new Big(entry==='0'&&acc?bigFormat(acc):entry);
      pendingOp='%';exprDisp=bigFormat(pctBase)+' % ×';acc=pctBase;entry='0';justEvaled=false;
    }catch(e){entry='⚠ '+e.message;justEvaled=true;}
    updCalc();return;
  }
  if(label==='='){
    try{
      const right=new Big(entry);let result;
      if(pendingOp==='%'&&pctBase!==null){result=pctBase.times(right.div(100));exprDisp=bigFormat(pctBase)+' % × '+bigFormat(right)+' =';pctBase=null;}
      else if(acc!==null&&pendingOp){result=applyOp(acc,pendingOp,right);exprDisp=bigFormat(acc)+' '+opSym(pendingOp)+' '+bigFormat(right)+' =';}
      else{result=right;exprDisp=bigFormat(right)+' =';}
      const resStr=bigFormat(result);
      addHist(exprDisp.replace(' =',''),resStr);
      acc=result;pendingOp=null;entry=resStr;justEvaled=true;
    }catch(e){entry='⚠ '+e.message;exprDisp='';acc=null;pendingOp=null;pctBase=null;justEvaled=true;}
    updCalc();return;
  }
  const opMap={'+':'+','−':'-','×':'*','÷':'/','xʸ':'^'};
  if(opMap[label]!==undefined){
    try{
      const right=new Big(entry);
      if(acc!==null&&pendingOp&&!justEvaled)acc=applyOp(acc,pendingOp,right);else acc=right;
      pendingOp=opMap[label];exprDisp=bigFormat(acc)+' '+label;entry='0';justEvaled=false;
    }catch(e){entry='⚠ '+e.message;justEvaled=true;}
    updCalc();return;
  }
  const fnMap={'√':'sqrt','∛':'cbrt','x²':'x²','x³':'x³','!':'!','sin':'sin','cos':'cos','tan':'tan','asin':'asin','acos':'acos','atan':'atan','log':'log','ln':'ln'};
  if(fnMap[label]!==undefined){
    try{
      const result=applyFn(fnMap[label],entry);const resStr=bigFormat(result);
      exprDisp=label+'('+entry+') =';entry=resStr;justEvaled=true;
    }catch(e){entry='⚠ '+e.message;justEvaled=true;}
    updCalc();return;
  }
  if(label==='π'){if(justEvaled){acc=null;pendingOp=null;exprDisp='';justEvaled=false;}entry=bigFormat(new Big('3.14159265358979323846264338327950288419716939937510'));updCalc();return;}
  if(label==='e'){if(justEvaled){acc=null;pendingOp=null;exprDisp='';justEvaled=false;}entry=bigFormat(new Big('2.71828182845904523536028747135266249775724709369995'));updCalc();return;}
}
function addHist(expr,res){
  historyArr.unshift({expr,res});
  if(historyArr.length>40)historyArr.pop();
  renderHist();
}
function renderHist(){
  const el=document.getElementById('hist-list');
  const emp=document.getElementById('hist-empty');
  if(!historyArr.length){if(emp)emp.style.display='block';el.innerHTML='<div class="hist-empty" id="hist-empty">No calculations yet</div>';return;}
  el.innerHTML=historyArr.map((h,i)=>`
    <div class="hist-item" onclick="recallHist(${i})">
      <div class="hi-expr">${h.expr.length>32?h.expr.slice(0,32)+'…':h.expr}</div>
      <div class="hi-res">${h.res.length>36?h.res.slice(0,36)+'…':h.res}</div>
    </div>`).join('');
}
function recallHist(i){
  const h=historyArr[i];
  acc=null;pendingOp=null;entry=h.res;justEvaled=true;exprDisp=h.expr+' =';updCalc();
}
function clearHist(){historyArr=[];renderHist();}

document.addEventListener('keydown',e=>{
  const a=document.activeElement;
  if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'))return;
  const m={'Enter':'=','Backspace':'DEL','Escape':'C','*':'×','/':'÷','-':'−'};
  const k=m[e.key]||e.key;
  if('0123456789.+−×÷%^'.includes(k)||['DEL','C','='].includes(k)){e.preventDefault();calcPress(k);}
});

renderCalcBtns();updCalc();
</script>
